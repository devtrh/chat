services:
  chat-service:
    build: ./service
    container_name: chat-service
    ports:
      - "127.0.0.1:4010:4010"     # solo local; nginx hace de puerta
    volumes:
      - ./adjuntos:/adjuntos      # mismo patrón que ./CARGAS en Gestión
    # env_file y NO `environment: - X=${X}`: compose interpola `$` dentro del
    # YAML, así que una contraseña que contenga `$algo` se convierte en cadena
    # vacía y el contenedor arranca con credenciales mutiladas (pasó el
    # 2026-07-20: 23 caracteres llegaron como 19). Con env_file los valores
    # viajan literales.
    env_file:
      - chat.env
    environment:
      - PORT=4010
      - ADJUNTOS_PATH=/adjuntos
      - MAX_UPLOAD_MB=100
    restart: always
