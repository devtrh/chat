# Bloques para el chat compartido.
#
# VAN DENTRO del server { listen 443 ssl; server_name n8n.datazentrika.com }
# que ya existe — el mismo donde vive /gestion/. No son un archivo suelto.
#
# El bloque de SSE va ANTES del general y copia el que ya funciona para el chat
# de Gestión (nginx-server.conf:27-40): sin buffering, timeout largo.

location ^~ /chat/api/sse {
    proxy_pass         http://127.0.0.1:4010/sse;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   Authorization $http_authorization;
    proxy_set_header   Connection '';
    proxy_buffering    off;
    proxy_cache        off;
    proxy_read_timeout 3600s;
}

location ^~ /chat/api/ {
    proxy_pass            http://127.0.0.1:4010/;
    proxy_http_version    1.1;
    proxy_set_header      Host $host;
    proxy_set_header      Authorization $http_authorization;
    proxy_read_timeout    120s;
    client_max_body_size  150M;   # 100MB de archivo -> ~133MB en base64
}
